services:
  db:
    image: postgres:18-alpine
    container_name: hplus-analytics-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - hplus_analytics_postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hplus_analytics

  app:
    build: .
    container_name: hplus-analytics-app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      NODE_ENV: production
      UPLOAD_DIR: /app/data/uploads
    command: ["sh", "-c", "npx prisma migrate deploy && npx prisma db seed && npm start"]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - hplus_analytics_uploads:/app/data/uploads
      - ${TOWN_BULK_KASUKABE_DIR}:${TOWN_BULK_KASUKABE_DIR}:ro
      - ${TOWN_BULK_KOSHIGAYA_DIR}:${TOWN_BULK_KOSHIGAYA_DIR}:ro
      - ${CTI_BULK_DIR}:${CTI_BULK_DIR}:ro
    networks:
      - hplus_analytics

volumes:
  hplus_analytics_postgres:
    name: hplus_analytics_postgres
  hplus_analytics_uploads:
    name: hplus_analytics_uploads

networks:
  hplus_analytics:
    name: hplus_analytics_network
